name: CI — Install & Smoke Test

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Bootstrap check (no dependencies)
        run: python install/bootstrap.py --check --profile lite --json

      - name: Install standard dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[standard]"
          python -m pip install pytest

      - name: Run doctor
        run: python scripts/pipeline.py doctor --check --json

      - name: Run full test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Verify pp CLI entry point
        run: |
          python scripts/pipeline.py help
          python scripts/pipeline.py inspect . --json
